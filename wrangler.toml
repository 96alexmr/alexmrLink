name = "alexmr-link"
main = "src/index.ts"
compatibility_date = "2024-11-01"

routes = [
  { pattern = "link.alexmr.me/*", zone_name = "alexmr.me" }
]

kv_namespaces = [
  { binding = "LINKS", id = "REPLACE_WITH_KV_NAMESPACE_ID" }
]

[vars]
ADMIN_USERNAME = "admin"
# ADMIN_PASSWORD is a secret: set with `wrangler secret put ADMIN_PASSWORD`
